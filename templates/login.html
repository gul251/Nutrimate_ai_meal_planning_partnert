<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - NutriMate</title>

  <!-- ✅ FLASK STATIC -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>

<body>

<a class="skip-link" href="#loginMain">Skip to main content</a>

<div class="login-container">

  <!-- LOGIN FORM -->
  <div class="login-section" id="loginMain">
    <h2>Login to Your Dashboard</h2>

    <form id="loginForm">

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email..." required>

        <div class="password-box">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password..." required>

          <button type="button" onclick="togglePassword()">Show</button>
        </div>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="mailto:nutrimte.test@gmail.com">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="signup">
        Don’t have an account?
        <!-- ✅ FIX -->
        <a href="{{ url_for('createaccount') }}">Create Account</a>
      </div>

    </form>
  </div>

  <!-- RIGHT SIDE -->
  <div class="info-section">
    <div class="logo">NutriMate</div>

    <!-- ✅ FIXED IMAGE PATH -->
    <img src="{{ url_for('static', filename='images/Healthy lifestyle.jpeg') }}" alt="Healthy meal">

    <h3>Your AI Meal Planning Partner</h3>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- ✅ FLASK STATIC JS -->
<script src="{{ url_for('static', filename='js/config.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script>
redirectIfAuthenticated();

// Toggle password
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.querySelector('.login-btn');

  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    await login(email, password);
  } catch (err) {
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = "Login";
  }
});
</script>

</body>
</html>
